<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roddie Walker Tours — Discover Lisbon on Foot</title>
  <meta name="description" content="Authentic walking tours in Lisbon with a local guide. Explore Alfama, Belém, and hidden gems of the city.">
  <meta name="keywords" content="Lisbon walking tours, guided tours Lisbon, Alfama tour, Belém tour, Lisbon history">
  <link rel="icon" type="image/png" href="/assets/logo/favicon_512.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #FAF7F2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #1C1A18;
    }
    
    .redirect-container {
      text-align: center;
      padding: 2rem;
      max-width: 500px;
    }
    
    .logo {
      margin-bottom: 2rem;
    }
    
    .logo img {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }
    
    .logo h1 {
      font-family: Georgia, 'Times New Roman', Times, serif;
      font-size: 1.8rem;
      font-weight: 600;
      color: #C05A2A;
      margin-top: 0.5rem;
      letter-spacing: -0.5px;
    }
    
    .logo span {
      color: #2A5C8A;
      font-weight: 400;
    }
    
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #F5EFE6;
      border-top-color: #C05A2A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 2rem auto;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .message {
      font-size: 1.1rem;
      color: #7A6E62;
      margin-bottom: 1.5rem;
    }
    
    .language-links {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin-top: 1rem;
    }
    
    .language-links a {
      display: inline-block;
      padding: 10px 24px;
      background: #C05A2A;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    
    .language-links a:hover {
      background: #E07B4A;
      transform: translateY(-2px);
    }
    
    .language-links a:first-child {
      background: #2A5C8A;
    }
    
    .language-links a:first-child:hover {
      background: #4A7FAD;
    }
    
    .footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #7A6E62;
    }
    
    @media (max-width: 480px) {
      .language-links {
        flex-direction: column;
        gap: 1rem;
      }
      .logo h1 {
        font-size: 1.4rem;
      }
    }
  </style>
  <script>
    // Deteta o idioma do navegador
    const userLang = navigator.language || navigator.userLanguage;
    const prefersPT = userLang.toLowerCase().startsWith('pt');
    const lang = prefersPT ? 'pt' : 'en';
    
    // Redireciona imediatamente para o idioma apropriado
    window.location.href = '/' + lang + '/';
  </script>
</head>
<body>
  <div class="redirect-container">
    <div class="logo">
      <img src="/assets/logo/favicon_512.png" alt="Roddie Walker Tours">
      <h1>Roddie<span>Walker</span></h1>
    </div>
    
    <div class="spinner"></div>
    
    <p class="message">Escolha o seu idioma / Choose your language</p>
    
    <div class="language-links">
      <a href="/pt/">🇵🇹 Português</a>
      <a href="/en/">🇬🇧 English</a>
    </div>
    
    <div class="footer">
      <p>Lisbon walking tours · Authentic experiences</p>
    </div>
  </div>
</body>
</html>
