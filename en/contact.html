<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact & Booking — Roddie Walker Tours Lisbon</title>
  <link rel="icon" type="image/png" href="/assets/logo/favicon_512.png" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

  <header class="site-header">
    <nav class="nav container">
      <a href="/en/index.html" class="nav__logo-img">
        <img src="/assets/logo/favicon_512.png" alt="Roddie Walker Tours Logo" />
        <span class="nav__logo-text">Roddie<span>Walker</span></span>
      </a>
      <ul class="nav__links">
        <li><a href="/en/contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section class="section">
    <div class="container">
      <button id="generate-flyer" class="btn btn--outline-dark">📄 Take a flyer with you</button>
    </div>
  </section>

  <script>
    async function generateFlyer() {
      const button = document.getElementById('generate-flyer');
      const originalText = button.innerHTML;
      button.innerHTML = '⏳ Generating flyer...';
      button.disabled = true;
      
      try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a5' });
        
        const loadImage = (src) => new Promise((resolve) => {
          const img = new Image();
          img.crossOrigin = "Anonymous"; // CORREÇÃO PARA O BLOQUEIO NO SAFARI
          img.onload = () => resolve(img);
          img.onerror = () => resolve(null); 
          img.src = src;
        });

        // Título e Conteúdo
        pdf.setFont('helvetica', 'bold');
        pdf.setTextColor(192, 90, 42);
        pdf.text('Roddie Walker Tours', 12, 20);

        // QR Code
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent('https://www.roddiewalker-tours.com')}`;
        const qrCode = await loadImage(qrUrl);
        
        if (qrCode) {
          pdf.addImage(qrCode, 'PNG', 100, 160, 35, 35);
        }

        pdf.setFontSize(10);
        pdf.setTextColor(0, 0, 0);
        pdf.text('Book your authentic Lisbon experience.', 12, 35);
        
        pdf.save('RoddieWalkerTours_EN.pdf');
      } catch (e) {
        console.error(e);
      } finally {
        button.innerHTML = originalText;
        button.disabled = false;
      }
    }
    document.getElementById('generate-flyer').addEventListener('click', generateFlyer);
  </script>
</body>
</html>
